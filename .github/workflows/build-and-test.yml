name: Build SAIL

on:
  push:
    tags:
      - 'v*'
  workflow_dispatch:

permissions:
  contents: write

jobs:
  build:
    name: ${{ matrix.os }}
    runs-on: ${{ matrix.os }}

    strategy:
      fail-fast: false
      matrix:
        include:
          - os: ubuntu-latest
          - os: macos-latest
          - os: windows-latest

    steps:
      # ── Source ────────────────────────────────────────────────────────────
      - name: Checkout SAIL
        uses: actions/checkout@v4

      # ── Dependencies: Linux ───────────────────────────────────────────────
      - name: Install dependencies (Linux)
        if: runner.os == 'Linux'
        run: |
          sudo apt-get update -qq
          sudo apt-get install -y --no-install-recommends \
            cmake ninja-build pkg-config patchelf \
            libavcodec-dev libavformat-dev libavutil-dev libswscale-dev \
            libjpeg-dev libpng-dev libtiff-dev libwebp-dev \
            libgif-dev libopenjp2-7-dev libjxl-dev \
            libavif-dev libheif-dev librsvg2-dev

      # ── Dependencies: macOS ───────────────────────────────────────────────
      - name: Install dependencies (macOS)
        if: runner.os == 'macOS'
        run: |
          brew install \
            ffmpeg \
            jpeg libpng libtiff webp \
            giflib openjpeg jpeg-xl \
            libavif libheif librsvg \
            dylibbundler

      # ── Dependencies: Windows (vcpkg) ─────────────────────────────────────
      - name: Setup vcpkg cache (Windows)
        if: runner.os == 'Windows'
        uses: actions/cache@v4
        with:
          path: C:/vcpkg/installed
          key: vcpkg-sail-${{ runner.os }}-${{ hashFiles('**/vcpkg.json') }}
          restore-keys: vcpkg-sail-${{ runner.os }}

      - name: Install dependencies (Windows / vcpkg)
        if: runner.os == 'Windows'
        shell: pwsh
        run: |
          $env:VCPKG_ROOT = "C:/vcpkg"
          & "$env:VCPKG_ROOT/bootstrap-vcpkg.bat" -disableMetrics
          & "$env:VCPKG_ROOT/vcpkg" install `
            ffmpeg libjpeg-turbo libpng tiff libwebp giflib `
            openjpeg libjxl libavif libheif librsvg `
            --triplet x64-windows `
            --classic `
            --no-print-usage
          echo "VCPKG_ROOT=$env:VCPKG_ROOT" >> $env:GITHUB_ENV
          echo "VCPKG_TARGET_TRIPLET=x64-windows" >> $env:GITHUB_ENV

      # ── NanoSVG (header-only, no system package on any platform) ─────────
      - name: Install NanoSVG (Linux)
        if: runner.os == 'Linux'
        run: |
          git clone --depth 1 https://github.com/memononen/nanosvg.git /tmp/nanosvg
          sudo mkdir -p /usr/local/include
          sudo cp /tmp/nanosvg/src/nanosvg.h /tmp/nanosvg/src/nanosvgrast.h /usr/local/include/

      - name: Install NanoSVG (macOS)
        if: runner.os == 'macOS'
        run: |
          git clone --depth 1 https://github.com/memononen/nanosvg.git /tmp/nanosvg
          cp /tmp/nanosvg/src/nanosvg.h /tmp/nanosvg/src/nanosvgrast.h /opt/homebrew/include/

      - name: Install NanoSVG (Windows)
        if: runner.os == 'Windows'
        shell: pwsh
        run: |
          git clone --depth 1 https://github.com/memononen/nanosvg.git C:/nanosvg
          $dest = "$env:VCPKG_ROOT/installed/x64-windows/include"
          Copy-Item C:/nanosvg/src/nanosvg.h $dest
          Copy-Item C:/nanosvg/src/nanosvgrast.h $dest

      # ── Configure ─────────────────────────────────────────────────────────
      - name: Configure (Linux / macOS)
        if: runner.os != 'Windows'
        run: |
          cmake -B build -G Ninja \
            -DCMAKE_BUILD_TYPE=Release \
            -DCMAKE_INSTALL_PREFIX=${{ github.workspace }}/install \
            -DBUILD_SHARED_LIBS=ON \
            -DSAIL_COMBINE_CODECS=OFF \
            -DSAIL_MANIP_USE_SWSCALE=ON \
            -DSAIL_BUILD_APPS=OFF \
            -DSAIL_BUILD_EXAMPLES=OFF \
            -DSAIL_BUILD_BINDINGS=OFF \
            -DSAIL_THREAD_SAFE=ON \
            -DBUILD_TESTING=OFF

      - name: Configure (Windows)
        if: runner.os == 'Windows'
        shell: pwsh
        run: |
          cmake -B build -G "Visual Studio 17 2022" -A x64 `
            -DCMAKE_BUILD_TYPE=Release `
            -DCMAKE_INSTALL_PREFIX="${{ github.workspace }}/install" `
            -DCMAKE_TOOLCHAIN_FILE="$env:VCPKG_ROOT/scripts/buildsystems/vcpkg.cmake" `
            -DVCPKG_TARGET_TRIPLET=x64-windows `
            -DBUILD_SHARED_LIBS=ON `
            -DSAIL_COMBINE_CODECS=OFF `
            -DSAIL_MANIP_USE_SWSCALE=ON `
            -DSAIL_BUILD_APPS=OFF `
            -DSAIL_BUILD_EXAMPLES=OFF `
            -DSAIL_BUILD_BINDINGS=OFF `
            -DSAIL_THREAD_SAFE=ON `
            -DSAIL_WINDOWS_INSTALL_PDB=OFF `
            -DSAIL_WINDOWS_UTF8_PATHS=ON `
            -DBUILD_TESTING=OFF

      # ── Build & Install ───────────────────────────────────────────────────
      - name: Build (Linux / macOS)
        if: runner.os != 'Windows'
        run: cmake --build build --config Release --parallel $(nproc 2>/dev/null || sysctl -n hw.logicalcpu)

      - name: Build (Windows)
        if: runner.os == 'Windows'
        run: cmake --build build --config Release --parallel

      - name: Install
        run: cmake --install build --config Release

      # ── Bundle only direct SAIL dependencies ──────────────────────────────
      #
      # Strategy: collect the libs that SAIL's own .so/.dylib files link to
      # directly (depth=1 only), skipping glibc/system libs. This keeps the
      # bundle small — we don't recurse into transitive deps of deps.

      - name: Bundle dependencies (Linux)
        if: runner.os == 'Linux'
        run: |
          INSTALL="${{ github.workspace }}/install"
          BUNDLED="$INSTALL/lib/sail/codecs/lib"
          mkdir -p "$BUNDLED"

          # Collect direct (depth-1) non-system deps of every SAIL lib + codec
          find "$INSTALL/lib" -name "*.so*" -not -type d | while read lib; do
            ldd "$lib" 2>/dev/null | awk '/=> \// { print $3 }' | while read dep; do
              case "$(basename "$dep")" in
                libc.so*|libm.so*|libdl.so*|libpthread.so*|librt.so*|libgcc_s.so*|\
                libstdc++.so*|ld-linux*.so*|linux-vdso.so*) continue ;;
              esac
              [ -f "$dep" ] && cp -Pn "$dep" "$BUNDLED/" 2>/dev/null || true
            done
          done

          # Fix rpaths: codecs find bundled libs in their own ../lib sibling dir
          find "$INSTALL/lib" -name "*.so*" -not -type d | while read lib; do
            patchelf --set-rpath '$ORIGIN:$ORIGIN/sail/codecs/lib' "$lib" 2>/dev/null || true
          done
          find "$BUNDLED" -name "*.so*" -not -type d | while read lib; do
            patchelf --set-rpath '$ORIGIN' "$lib" 2>/dev/null || true
          done

          echo "=== Bundled ==="
          du -sh "$BUNDLED"
          ls "$BUNDLED" | wc -l
          echo "=== Total install ==="
          du -sh "$INSTALL"

      - name: Bundle dependencies (macOS)
        if: runner.os == 'macOS'
        run: |
          INSTALL="${{ github.workspace }}/install"
          BUNDLED="$INSTALL/lib/sail/codecs/lib"
          mkdir -p "$BUNDLED"

          # Collect direct deps of SAIL libs only (no recursion)
          find "$INSTALL/lib" -name "*.dylib" | while read lib; do
            otool -L "$lib" 2>/dev/null | awk 'NR>1 {print $1}' | while read dep; do
              case "$dep" in
                /usr/lib/*|/System/*|@rpath/*|@loader_path/*|@executable_path/*) continue ;;
              esac
              [ -f "$dep" ] && cp -n "$dep" "$BUNDLED/" 2>/dev/null || true
            done
          done

          # Fix install names
          find "$BUNDLED" -name "*.dylib" | while read lib; do
            install_name_tool -id "@rpath/sail/codecs/lib/$(basename "$lib")" "$lib" 2>/dev/null || true
          done
          find "$INSTALL/lib" -name "*.dylib" | while read sail_lib; do
            otool -L "$sail_lib" 2>/dev/null | awk 'NR>1 {print $1}' | while read dep; do
              case "$dep" in
                /usr/lib/*|/System/*|@rpath/*|@loader_path/*|@executable_path/*) continue ;;
              esac
              base=$(basename "$dep")
              [ -f "$BUNDLED/$base" ] && \
                install_name_tool -change "$dep" "@rpath/sail/codecs/lib/$base" "$sail_lib" 2>/dev/null || true
            done
            install_name_tool -add_rpath "@loader_path/sail/codecs/lib" "$sail_lib" 2>/dev/null || true
          done

          echo "=== Bundled ==="
          du -sh "$BUNDLED"
          echo "=== Total install ==="
          du -sh "$INSTALL"

      - name: Bundle dependencies (Windows)
        if: runner.os == 'Windows'
        shell: pwsh
        run: |
          $install  = "${{ github.workspace }}/install"
          $bundled  = "$install/lib/sail/codecs/lib"
          New-Item -ItemType Directory -Force -Path $bundled | Out-Null

          # Copy only the vcpkg DLLs that are direct imports of SAIL's own DLLs.
          # Use dumpbin to find direct imports, then match against vcpkg bin.
          $vcpkgBin = "$env:VCPKG_ROOT/installed/x64-windows/bin"
          $sailLibs = Get-ChildItem "$install/bin/*.dll","$install/lib/sail/codecs/*.dll" -ErrorAction SilentlyContinue

          $needed = [System.Collections.Generic.HashSet[string]]::new([System.StringComparer]::OrdinalIgnoreCase)
          foreach ($dll in $sailLibs) {
            $output = & dumpbin /dependents $dll.FullName 2>$null
            foreach ($line in $output) {
              if ($line -match '^\s+(\S+\.dll)\s*$') {
                $null = $needed.Add($matches[1])
              }
            }
          }

          foreach ($name in $needed) {
            $src = Join-Path $vcpkgBin $name
            if (Test-Path $src) {
              Copy-Item $src $bundled -Force
            }
          }

          # Also copy the SAIL DLLs themselves into bin (standard Windows layout)
          # The codec plugin DLLs stay in lib/sail/codecs/
          Write-Host "=== Bundled DLLs ==="
          Get-ChildItem $bundled | Measure-Object | Select-Object -ExpandProperty Count
          Write-Host "=== Total size ==="
          "{0:N1} MB" -f ((Get-ChildItem $install -Recurse | Measure-Object -Property Length -Sum).Sum / 1MB)

      # ── Strip debug symbols (Linux / macOS) to shrink further ─────────────
      - name: Strip binaries (Linux)
        if: runner.os == 'Linux'
        run: |
          find ${{ github.workspace }}/install -name "*.so*" -not -type d \
            -exec strip --strip-unneeded {} \; 2>/dev/null || true

      - name: Strip binaries (macOS)
        if: runner.os == 'macOS'
        run: |
          find ${{ github.workspace }}/install -name "*.dylib" \
            -exec strip -x {} \; 2>/dev/null || true

      # ── Zip only headers + libs (no apps, no examples, no cmake files) ────
      - name: Package (Linux / macOS)
        if: runner.os != 'Windows'
        run: |
          INSTALL="${{ github.workspace }}/install"
          TAG="${{ github.ref_name }}"
          OS="${{ runner.os }}"
          ARCHIVE="sail-${TAG}-${OS}.zip"

          cd "$INSTALL"
          zip -r "${{ github.workspace }}/$ARCHIVE" \
            include/ \
            lib/ \
            --exclude "*/cmake/*" \
            --exclude "*/pkgconfig/*"

          echo "ARCHIVE=$ARCHIVE" >> $GITHUB_ENV
          echo "=== Archive size ==="
          du -sh "${{ github.workspace }}/$ARCHIVE"

      - name: Package (Windows)
        if: runner.os == 'Windows'
        shell: pwsh
        run: |
          $install = "${{ github.workspace }}/install"
          $tag     = "${{ github.ref_name }}"
          $archive = "sail-$tag-Windows.zip"

          # Include headers, lib (for import libs + codec plugins), and the
          # runtime DLLs in bin/; exclude cmake integration files
          $items = @(
            "$install/include",
            "$install/lib",
            "$install/bin"
          )
          Compress-Archive -Path $items -DestinationPath "${{ github.workspace }}/$archive"
          echo "ARCHIVE=$archive" >> $env:GITHUB_ENV

          $size = (Get-Item "${{ github.workspace }}/$archive").Length / 1MB
          Write-Host ("=== Archive size: {0:N1} MB ===" -f $size)

      # ── Create / update GitHub Release and upload zip ─────────────────────
      - name: Upload to GitHub Release
        uses: softprops/action-gh-release@v2
        with:
          tag_name: ${{ github.ref_name }}
          name: SAIL ${{ github.ref_name }}
          draft: false
          prerelease: false
          files: ${{ github.workspace }}/${{ env.ARCHIVE }}
